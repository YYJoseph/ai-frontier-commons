name: Submit AI Resource
description: Suggest a paper, repo, interview, course, tool, article, dataset, or talk for AI Frontier Commons.
title: "[Resource]: "
labels: ["resource-submission"]
body:
  - type: dropdown
    id: resource_type
    attributes:
      label: Resource type
      options:
        - paper
        - repo
        - article
        - interview
        - course
        - tool
        - dataset
        - talk
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Link
      placeholder: https://...
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this valuable?
      description: Explain the learning value in concrete terms.
    validations:
      required: true
  - type: input
    id: topics
    attributes:
      label: Suggested topics
      placeholder: large-language-models, ai-agents, evaluation
    validations:
      required: true
  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - beginner
        - intermediate
        - advanced
    validations:
      required: true
